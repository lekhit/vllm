name: Build and Release vLLM Wheel

on:
  # This allows you to trigger the build manually from the GitHub website
  workflow_dispatch: 
  # This triggers the build automatically every time you push code to SegServ
  push:
    branches:
      - SegServ

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Give the action permission to create a release
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/build.txt
          pip install build wheel setuptools ninja

      - name: Install CUDA Toolkit
        # vLLM requires CUDA to compile its custom kernels
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '12.2.0' 
          use-github-cache: 'false'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools ninja

      - name: Build the Wheel
        run: python setup.py bdist_wheel

      - name: Create Release and Upload Wheel
        uses: softprops/action-gh-release@v2
        with:
          # Creates a "continuous" tag that updates with your latest build
          tag_name: latest-segserv
          name: Latest SegServ Build
          files: dist/*.whl
          make_latest: true